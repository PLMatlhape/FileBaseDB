name: Security

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (pull request range)
        if: github.event_name == 'pull_request'
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --redact --no-banner --verbose --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Secret scan (push range)
        if: github.event_name == 'push'
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --redact --no-banner --verbose --log-opts="${{ github.event.before }}..${{ github.sha }}"
